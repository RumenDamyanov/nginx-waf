# nginx-waf Configuration Examples
#
# Version: 0.2.0
#
# Available Directives:
#
#   waf on|off
#     - Enable/disable WAF
#     - Context: http, server, location
#     - Default: off
#
#   waf_mode blacklist|whitelist
#     - Blacklist: block matched IPs, allow others
#     - Whitelist: allow matched IPs, block others
#     - Context: http, server, location
#     - Default: blacklist
#
#   waf_list name path [tags]
#     - Define an IP list
#     - Context: http only
#     - Tags: comma-separated, quoted
#
#   waf_enable_lists name1 [name2] | tag:tagname | all
#     - Enable specific lists for this context
#     - Context: http, server, location
#
#   waf_disable_lists name1 [name2] | tag:tagname
#     - Disable specific lists (overrides enable)
#     - Context: http, server, location
#
#   waf_log_prefix string
#     - Custom prefix for log messages
#     - Context: http, server, location
#     - Default: "waf"
#


# =============================================================================
# Example 1: Simple Global Blacklist
# =============================================================================
#
# Block all IPs in the blacklist across all sites.

http {
    waf_list threats "/etc/nginx/waf/threats.txt";

    waf on;
    waf_mode blacklist;
    waf_enable_lists all;

    server {
        listen 80;
        server_name example.com;

        location / {
            root /var/www/html;
        }
    }
}


# =============================================================================
# Example 2: Per-Server Configuration
# =============================================================================
#
# Different WAF settings for different virtual hosts.

http {
    waf_list tor "/etc/nginx/waf/tor-exits.txt" "anonymizers";
    waf_list botnets "/etc/nginx/waf/botnets.txt" "threats";
    waf_list trusted "/etc/nginx/waf/trusted.txt" "internal";

    # Default: WAF off
    waf off;

    # Public website - no WAF
    server {
        listen 80;
        server_name www.example.com;

        location / {
            root /var/www/public;
        }
    }

    # API server - block anonymizers
    server {
        listen 80;
        server_name api.example.com;

        waf on;
        waf_mode blacklist;
        waf_enable_lists tag:anonymizers;

        location / {
            root /var/www/api;
        }
    }

    # Admin panel - whitelist only
    server {
        listen 80;
        server_name admin.example.com;

        waf on;
        waf_mode whitelist;
        waf_enable_lists trusted;

        location / {
            root /var/www/admin;
        }
    }
}


# =============================================================================
# Example 3: Per-Location Configuration
# =============================================================================
#
# Fine-grained control within a single server.

http {
    waf_list threats "/etc/nginx/waf/threats.txt" "security";
    waf_list trusted "/etc/nginx/waf/trusted.txt" "internal";

    server {
        listen 80;
        server_name app.example.com;

        # Default: no WAF for public content
        location / {
            root /var/www/app;
        }

        # API: block known threats
        location /api/ {
            waf on;
            waf_mode blacklist;
            waf_enable_lists threats;

            proxy_pass http://backend;
        }

        # Admin: whitelist only
        location /admin/ {
            waf on;
            waf_mode whitelist;
            waf_enable_lists trusted;

            proxy_pass http://admin-backend;
        }

        # Health check: always accessible
        location /health {
            waf off;
            return 200 "OK";
        }
    }
}


# =============================================================================
# Example 4: Tag-Based List Management
# =============================================================================
#
# Use tags to group and enable multiple lists.

http {
    # Define lists with tags
    waf_list tor "/etc/nginx/waf/tor.txt" "anonymizers,privacy";
    waf_list vpn "/etc/nginx/waf/vpn.txt" "anonymizers,privacy";
    waf_list datacenter "/etc/nginx/waf/datacenter.txt" "anonymizers,hosting";
    waf_list botnets "/etc/nginx/waf/botnets.txt" "threats,security";
    waf_list scanners "/etc/nginx/waf/scanners.txt" "threats,security";
    waf_list spam "/etc/nginx/waf/spam.txt" "abuse,security";

    server {
        listen 80;
        server_name secure.example.com;

        # Block all anonymizers (tor, vpn, datacenter)
        location / {
            waf on;
            waf_mode blacklist;
            waf_enable_lists tag:anonymizers;

            root /var/www/secure;
        }

        # Extra protection: block threats too
        location /sensitive/ {
            waf on;
            waf_mode blacklist;
            waf_enable_lists tag:anonymizers tag:threats;

            root /var/www/secure;
        }

        # Maximum protection: block everything suspicious
        location /critical/ {
            waf on;
            waf_mode blacklist;
            waf_enable_lists tag:anonymizers tag:threats tag:abuse;

            root /var/www/secure;
        }
    }
}


# =============================================================================
# Example 5: With Real IP Module
# =============================================================================
#
# Use with reverse proxy or CDN to get real client IP.

http {
    # Trust Cloudflare IPs
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;

    real_ip_header CF-Connecting-IP;

    # Now waf checks the real client IP, not the proxy IP
    waf_list threats "/etc/nginx/waf/threats.txt";

    waf on;
    waf_mode blacklist;
    waf_enable_lists threats;

    server {
        listen 80;
        server_name example.com;

        location / {
            root /var/www/html;
        }
    }
}


# =============================================================================
# Example 6: Context Inheritance
# =============================================================================
#
# Demonstrates how settings inherit from parent to child contexts.

http {
    waf_list global "/etc/nginx/waf/global.txt";
    waf_list admin "/etc/nginx/waf/admin.txt";

    # http level: WAF on, blacklist mode
    waf on;
    waf_mode blacklist;
    waf_enable_lists global;
    waf_log_prefix "http";

    server {
        listen 80;
        server_name test.example.com;

        # server level: inherits waf on, blacklist, global list
        # override log prefix
        waf_log_prefix "server";

        location / {
            # location inherits from server
            # waf on, blacklist, global list, log_prefix "server"
            root /var/www/html;
        }

        location /open {
            # override: disable WAF
            waf off;
            root /var/www/html;
        }

        location /admin {
            # override: whitelist mode with different list
            waf_mode whitelist;
            waf_enable_lists admin;
            waf_log_prefix "admin";
            root /var/www/html;
        }

        location /extra {
            # add more lists (both global and admin)
            waf_enable_lists global admin;
            root /var/www/html;
        }
    }
}


# =============================================================================
# Example 7: Disabling Lists in Child Context
# =============================================================================
#
# Use waf_disable_lists to exclude specific lists in a child context.

http {
    waf_list tor "/etc/nginx/waf/tor.txt" "anonymizers";
    waf_list vpn "/etc/nginx/waf/vpn.txt" "anonymizers";
    waf_list botnets "/etc/nginx/waf/botnets.txt" "threats";

    server {
        listen 80;
        server_name flexible.example.com;

        # Server default: block all anonymizers and threats
        waf on;
        waf_mode blacklist;
        waf_enable_lists all;

        # Default: all lists active
        location / {
            root /var/www/html;
        }

        # Allow Tor users for privacy-respecting content
        location /privacy {
            waf_disable_lists tor;
            root /var/www/html;
        }

        # Allow all anonymizers but still block threats
        location /anonymous-ok {
            waf_disable_lists tag:anonymizers;
            root /var/www/html;
        }

        # Only block botnets (disable all anonymizer lists)
        location /relaxed {
            waf_disable_lists tor vpn;
            root /var/www/html;
        }
    }
}
