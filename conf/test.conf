# nginx-waf Test Configuration
#
# Tests IP list loading and blocking functionality.
#
# Usage:
#   1. Build the module (see .development/build-module.sh)
#   2. Update load_module path below
#   3. Update list file paths below
#   4. Run: nginx -t -c /path/to/test.conf
#   5. Start: nginx -c /path/to/test.conf
#   6. Test: curl http://localhost:8080/

# Adjust path:
load_module /usr/lib64/nginx/modules/ngx_http_waf_module.so;

events {
    worker_connections 1024;
}

http {
    # Define IP lists at http level
    # Adjust paths to your actual list files

    waf_list blacklist "/etc/nginx/waf/blacklist.txt" "threats,test";
    waf_list whitelist "/etc/nginx/waf/whitelist.txt" "trusted";

    # Or use relative to nginx prefix:
    # waf_list blacklist "waf/example-blacklist.txt" "threats";
    # waf_list whitelist "waf/example-whitelist.txt" "trusted";

    # Global defaults
    waf off;
    waf_mode blacklist;
    waf_log_prefix "waf";

    server {
        listen 8080;
        server_name localhost;

        access_log /tmp/nginx-waf-access.log;
        error_log /tmp/nginx-waf-error.log debug;

        # Default: WAF disabled
        location / {
            default_type text/plain;
            return 200 "OK - WAF disabled\n";
        }

        # Blacklist mode: block IPs in blacklist
        location /protected {
            waf on;
            waf_mode blacklist;
            waf_enable_lists blacklist;
            waf_log_prefix "protected";

            default_type text/plain;
            return 200 "OK - Protected area (blacklist mode)\n";
        }

        # Whitelist mode: only allow IPs in whitelist
        location /admin {
            waf on;
            waf_mode whitelist;
            waf_enable_lists whitelist;
            waf_log_prefix "admin";

            default_type text/plain;
            return 200 "OK - Admin area (whitelist mode)\n";
        }

        # Enable all lists
        location /strict {
            waf on;
            waf_mode blacklist;
            waf_enable_lists all;
            waf_log_prefix "strict";

            default_type text/plain;
            return 200 "OK - Strict mode (all lists)\n";
        }

        # Tag-based selection
        location /tag-test {
            waf on;
            waf_mode blacklist;
            waf_enable_lists tag:threats;
            waf_log_prefix "tag-test";

            default_type text/plain;
            return 200 "OK - Tag-based selection\n";
        }

        # Status endpoint (always accessible)
        location /status {
            waf off;

            default_type application/json;
            return 200 '{"status":"ok","waf":"disabled"}\n';
        }
    }
}
